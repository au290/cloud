<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — MiniStack Storage</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-title">Create account</div>
        <div class="auth-sub">Get an isolated S3 bucket and access keys instantly</div>
        <div id="alert"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="damar">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="6">
            </div>
            <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Create account</button>
        </form>
        <p style="margin-top:1rem; font-size:0.875rem; text-align:center; color:var(--muted)">
            Already have an account? <a href="/login.html">Sign in</a>
        </p>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
    if (getToken()) location.replace('/dashboard.html');

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const alertEl = document.getElementById('alert');
        btn.disabled = true;
        btn.textContent = 'Creating account…';
        alertEl.innerHTML = '';

        const res = await api.register({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        });

        if (!res) return;

        if (res.ok) {
            const data = await res.json();
            const bucket = data.bucket ? data.bucket.name : '(provisioning pending)';
            // The secret key is returned exactly once — show it before redirecting.
            document.getElementById('registerForm').style.display = 'none';
            alertEl.innerHTML = `
                <div class="alert alert-success" style="font-family:monospace;font-size:0.8125rem;text-align:left">
                    ✅ Account created. Your bucket: <strong>${bucket}</strong><br><br>
                    <strong>Access Key:</strong> ${data.access_key_id || '—'}<br>
                    <strong>Secret Key:</strong> ${data.secret_key || '—'}<br><br>
                    <span>Save the secret now — it won't be shown again.</span>
                </div>
                <a href="/login.html" class="btn btn-primary btn-full" style="margin-top:0.5rem">Continue to sign in</a>`;
        } else {
            const err = await res.json();
            alertEl.innerHTML = `<div class="alert alert-error">${err.detail || 'Registration failed'}</div>`;
            btn.disabled = false;
            btn.textContent = 'Create account';
        }
    });
</script>
</body>
</html>

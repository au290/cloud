<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — IaaS Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-title">Create account</div>
        <div class="auth-sub">Start renting cloud resources today</div>
        <div id="alert"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="Damar Jati">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="6">
            </div>
            <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Create account</button>
        </form>
        <p style="margin-top:1rem; font-size:0.875rem; text-align:center; color:var(--muted)">
            Already have an account? <a href="/login.html">Sign in</a>
        </p>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
    if (getToken()) location.replace('/dashboard.html');

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const alertEl = document.getElementById('alert');
        btn.disabled = true;
        btn.textContent = 'Creating account…';
        alertEl.innerHTML = '';

        const res = await api.register({
            full_name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        });

        if (!res) return;

        if (res.ok) {
            alertEl.innerHTML = `<div class="alert alert-success">Account created! Redirecting to login…</div>`;
            setTimeout(() => location.href = '/login.html', 1500);
        } else {
            const err = await res.json();
            const msg = Array.isArray(err.detail) ? err.detail.map(e => e.msg).join(', ') : (err.detail || 'Registration failed');
            alertEl.innerHTML = `<div class="alert alert-error">${msg}</div>`;
            btn.disabled = false;
            btn.textContent = 'Create account';
        }
    });
</script>
</body>
</html>

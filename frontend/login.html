<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — IaaS Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Sign in to your IaaS Portal account</div>
        <div id="alert"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Sign in</button>
        </form>
        <p style="margin-top:1rem; font-size:0.875rem; text-align:center; color:var(--muted)">
            Don't have an account? <a href="/register.html">Register</a>
        </p>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
    if (getToken()) location.replace('/dashboard.html');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const alert = document.getElementById('alert');
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        alert.innerHTML = '';

        const res = await api.login({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        });

        if (!res) return;

        if (res.ok) {
            const data = await res.json();
            setToken(data.access_token);
            // Check if admin and redirect accordingly
            const meRes = await api.me();
            const user = meRes ? await meRes.json() : null;
            location.href = (user && user.is_admin) ? '/admin.html' : '/dashboard.html';
        } else {
            const err = await res.json();
            const msg = Array.isArray(err.detail) ? err.detail.map(e => e.msg).join(', ') : (err.detail || 'Login failed');
            alert.innerHTML = `<div class="alert alert-error">${msg}</div>`;
            btn.disabled = false;
            btn.textContent = 'Sign in';
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — MiniStack Storage</title>
    <meta name="description" content="Sign in to your MiniStack Storage account">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <span class="auth-logo">🏛️</span>
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Sign in to MiniStack Storage</div>
        <div id="alert"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn btn-primary btn-full" type="submit" id="submitBtn" style="margin-top:0.5rem">
                Sign in
            </button>
        </form>
        <p style="margin-top:1.25rem; font-size:0.875rem; text-align:center; color:var(--muted)">
            Don't have an account? <a href="/register.html">Create one</a>
        </p>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
    if (getToken()) location.replace('/dashboard.html');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const alertEl = document.getElementById('alert');
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        alertEl.innerHTML = '';

        const res = await api.login({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        });

        if (!res) return;

        if (res && res.ok) {
            const data = await res.json();
            setToken(data.access_token);
            location.href = data.is_admin ? '/admin.html' : '/dashboard.html';
        } else {
            const err = res ? await res.json() : {};
            alertEl.innerHTML = `<div class="alert alert-error">${err.detail || 'Login failed'}</div>`;
            btn.disabled = false;
            btn.textContent = 'Sign in';
        }
    });
</script>
</body>
</html>

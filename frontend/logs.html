<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs — IaaS Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
    <span class="nav-brand">☁ IaaS Portal</span>
    <div class="nav-right">
        <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="section-title">Rental Activity Logs</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Package</th>
                        <th>Type</th>
                        <th>Action</th>
                        <th>Resource</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr><td colspan="6" class="empty">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
if (!getToken()) location.replace('/login.html');

function logout() { clearToken(); location.href = '/login.html'; }

function typeClass(t) {
    return { compute: 'badge-compute', storage: 'badge-storage', network: 'badge-network' }[t] || '';
}

function fmtDateTime(iso) {
    return new Date(iso).toLocaleString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
    });
}

(async () => {
    const res = await api.logs();
    if (!res) return;
    const logs = await res.json();
    const tbody = document.getElementById('logsBody');
    if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No activity yet.</td></tr>';
        return;
    }
    tbody.innerHTML = logs.map((l, i) => `
        <tr>
            <td style="color:var(--muted)">${i + 1}</td>
            <td><strong>${l.package.name}</strong></td>
            <td><span class="badge ${typeClass(l.package.type)}">${l.package.type}</span></td>
            <td><span class="badge ${l.action === 'rent' ? 'badge-rent' : 'badge-release'}">${l.action}</span></td>
            <td style="font-family:monospace;font-size:0.8125rem;color:var(--muted)">${l.resource_ref || '—'}</td>
            <td style="color:var(--muted);font-size:0.8125rem">${fmtDateTime(l.timestamp)}</td>
        </tr>
    `).join('');
})();
</script>
</body>
</html>
